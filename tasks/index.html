<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タスク管理アプリ | とある制御屋の備忘録</title>
  <meta name="description" content="左側でタスクを入力し、右側の一覧で完了チェック・選択・削除ができる無料タスク管理アプリです。">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #eef6ff;
      --panel: rgba(255,255,255,.86);
      --line: rgba(30,64,175,.14);
      --text: #172554;
      --muted: #64748b;
      --blue: #2563eb;
      --cyan: #0891b2;
      --green: #16a34a;
      --rose: #e11d48;
      --shadow: rgba(37,99,235,.14);
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI','Hiragino Sans','Yu Gothic UI',sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(56,189,248,.24), transparent 34%),
        radial-gradient(circle at 88% 8%, rgba(34,197,94,.18), transparent 32%),
        linear-gradient(135deg, #eff6ff, #ecfeff 45%, #f8fafc);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(238,246,255,.82);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,.8);
    }
    .header-inner {
      max-width: 1180px;
      height: 56px;
      margin: 0 auto;
      padding: 0 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    a { color: var(--blue); text-decoration: none; font-weight: 800; }
    .brand { font-weight: 900; letter-spacing: 0; }
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 22px 56px;
    }
    .title-row {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }
    h1 { margin: 0 0 6px; font-size: clamp(1.7rem, 4vw, 2.8rem); line-height: 1.15; }
    .lead { margin: 0; color: var(--muted); font-size: .92rem; }
    .app {
      display: grid;
      grid-template-columns: minmax(260px, .92fr) 76px minmax(320px, 1.35fr);
      gap: 14px;
      align-items: stretch;
    }
    .panel {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.9);
      border-radius: 20px;
      box-shadow: 0 18px 46px var(--shadow), inset 0 1px 0 rgba(255,255,255,.95);
      padding: 18px;
      min-height: 500px;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }
    h2 { margin: 0; font-size: 1rem; }
    .count {
      padding: 4px 10px;
      border-radius: 999px;
      background: #e0f2fe;
      color: var(--cyan);
      font-size: .72rem;
      font-weight: 900;
    }
    label { display: block; margin-bottom: 8px; color: var(--muted); font-size: .8rem; font-weight: 800; }
    textarea {
      width: 100%;
      min-height: 230px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      color: var(--text);
      background: rgba(255,255,255,.72);
      font: inherit;
      line-height: 1.7;
      outline: none;
    }
    textarea:focus { border-color: rgba(37,99,235,.55); box-shadow: 0 0 0 4px rgba(37,99,235,.1); }
    .input-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, opacity .15s;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .45; cursor: default; transform: none; }
    .subtle { background: #e0f2fe; color: var(--cyan); }
    .danger { background: #ffe4e6; color: var(--rose); }
    .arrow-wrap {
      display: grid;
      place-items: center;
      min-height: 500px;
    }
    .arrow-button {
      width: 64px;
      height: 64px;
      border-radius: 999px;
      padding: 0;
      color: #fff;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      box-shadow: 0 14px 34px rgba(37,99,235,.25);
      font-size: 2rem;
      line-height: 1;
    }
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 9px;
      max-height: 410px;
      overflow: auto;
      padding-right: 4px;
    }
    .task {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 10px;
      align-items: start;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: rgba(255,255,255,.72);
      cursor: pointer;
    }
    .task.selected {
      border-color: rgba(37,99,235,.62);
      background: linear-gradient(135deg, rgba(37,99,235,.13), rgba(8,145,178,.12));
      box-shadow: inset 4px 0 0 var(--blue);
    }
    .task input { width: 18px; height: 18px; margin-top: 2px; accent-color: var(--green); }
    .task-text {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      line-height: 1.55;
      font-weight: 700;
    }
    .task.done .task-text {
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-thickness: 2px;
    }
    .list-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .empty {
      min-height: 220px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      border: 1px dashed rgba(100,116,139,.3);
      border-radius: 16px;
      background: rgba(255,255,255,.42);
      font-weight: 800;
    }
    .toast {
      min-height: 28px;
      margin-top: 10px;
      color: var(--rose);
      font-size: .82rem;
      font-weight: 900;
    }
    @media (max-width: 860px) {
      .title-row { align-items: start; flex-direction: column; }
      .app { grid-template-columns: 1fr; }
      .panel { min-height: auto; }
      .arrow-wrap { min-height: auto; }
      .arrow-button { width: 100%; border-radius: 16px; height: 54px; }
      .task-list { max-height: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <span class="brand">タスク管理アプリ</span>
      <a href="../">ホームへ戻る</a>
    </div>
  </header>
  <main>
    <div class="title-row">
      <div>
        <h1>タスク管理</h1>
        <p class="lead">左に入力して中央の矢印で右へ追加。右側では完了チェックと選択削除ができます。</p>
      </div>
    </div>

    <div class="app">
      <section class="panel">
        <div class="panel-head">
          <h2>入力</h2>
          <span class="count">Draft</span>
        </div>
        <label for="taskInput">タスク内容</label>
        <textarea id="taskInput" placeholder="例: 見積書を確認する"></textarea>
        <div class="input-actions">
          <button class="subtle" id="addButton" type="button">追加</button>
          <button class="subtle" id="clearInputButton" type="button">入力を消す</button>
        </div>
        <div class="toast" id="toast" aria-live="polite"></div>
      </section>

      <div class="arrow-wrap">
        <button class="arrow-button" id="arrowButton" type="button" aria-label="タスクを右の一覧へ追加">→</button>
      </div>

      <section class="panel">
        <div class="panel-head">
          <h2>タスク一覧</h2>
          <span class="count" id="taskCount">0 Tasks</span>
        </div>
        <div id="taskList" class="task-list" aria-live="polite"></div>
        <div class="list-actions">
          <button class="danger" id="deleteButton" type="button" disabled>選択を削除</button>
          <button class="subtle" id="clearDoneButton" type="button">完了を削除</button>
        </div>
      </section>
    </div>
  </main>

  <script>
    (function () {
      var input = document.getElementById('taskInput');
      var addButton = document.getElementById('addButton');
      var arrowButton = document.getElementById('arrowButton');
      var clearInputButton = document.getElementById('clearInputButton');
      var list = document.getElementById('taskList');
      var count = document.getElementById('taskCount');
      var deleteButton = document.getElementById('deleteButton');
      var clearDoneButton = document.getElementById('clearDoneButton');
      var toast = document.getElementById('toast');
      var storageKey = 'toaruseigyoya-task-app';
      var selectedId = null;
      var tasks = load();

      function load() {
        try {
          return JSON.parse(localStorage.getItem(storageKey) || '[]');
        } catch (e) {
          return [];
        }
      }

      function save() {
        localStorage.setItem(storageKey, JSON.stringify(tasks));
      }

      function show(message) {
        toast.textContent = message || '';
      }

      function addTask() {
        var text = input.value.trim();
        if (!text) {
          show('タスクを入力してください。');
          input.focus();
          return;
        }
        tasks.unshift({
          id: String(Date.now()) + Math.random().toString(16).slice(2),
          text: text,
          done: false
        });
        input.value = '';
        selectedId = tasks[0].id;
        show('');
        save();
        render();
      }

      function selectTask(id) {
        selectedId = selectedId === id ? null : id;
        render();
      }

      function toggleDone(id, checked) {
        tasks = tasks.map(function (task) {
          return task.id === id ? Object.assign({}, task, { done: checked }) : task;
        });
        save();
        render();
      }

      function deleteSelected() {
        if (!selectedId) return;
        tasks = tasks.filter(function (task) { return task.id !== selectedId; });
        selectedId = null;
        save();
        render();
      }

      function clearDone() {
        tasks = tasks.filter(function (task) { return !task.done; });
        if (!tasks.some(function (task) { return task.id === selectedId; })) selectedId = null;
        save();
        render();
      }

      function render() {
        list.innerHTML = '';
        count.textContent = tasks.length + (tasks.length === 1 ? ' Task' : ' Tasks');
        deleteButton.disabled = !selectedId;

        if (!tasks.length) {
          var empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = 'タスクはまだありません';
          list.appendChild(empty);
          return;
        }

        tasks.forEach(function (task) {
          var item = document.createElement('div');
          item.className = 'task' + (task.done ? ' done' : '') + (task.id === selectedId ? ' selected' : '');
          item.tabIndex = 0;
          item.setAttribute('role', 'button');
          item.setAttribute('aria-pressed', task.id === selectedId ? 'true' : 'false');

          var checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.checked = task.done;
          checkbox.setAttribute('aria-label', '完了にする');
          checkbox.addEventListener('click', function (event) {
            event.stopPropagation();
            toggleDone(task.id, checkbox.checked);
          });

          var text = document.createElement('div');
          text.className = 'task-text';
          text.textContent = task.text;

          item.addEventListener('click', function () { selectTask(task.id); });
          item.addEventListener('keydown', function (event) {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              selectTask(task.id);
            }
          });

          item.appendChild(checkbox);
          item.appendChild(text);
          list.appendChild(item);
        });
      }

      addButton.addEventListener('click', addTask);
      arrowButton.addEventListener('click', addTask);
      clearInputButton.addEventListener('click', function () {
        input.value = '';
        show('');
        input.focus();
      });
      deleteButton.addEventListener('click', deleteSelected);
      clearDoneButton.addEventListener('click', clearDone);
      input.addEventListener('keydown', function (event) {
        if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') addTask();
      });

      render();
    })();
  </script>
</body>
</html>

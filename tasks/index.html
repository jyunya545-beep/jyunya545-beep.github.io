<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タスク管理アプリ | とある制御屋の備忘録</title>
  <meta name="description" content="左側でタスクを入力し、右側の一覧で完了チェック・選択・削除ができる無料タスク管理アプリです。">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #eef6ff;
      --panel: rgba(255,255,255,.86);
      --line: rgba(30,64,175,.14);
      --text: #172554;
      --muted: #64748b;
      --blue: #2563eb;
      --cyan: #0891b2;
      --green: #16a34a;
      --rose: #e11d48;
      --shadow: rgba(37,99,235,.14);
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI','Hiragino Sans','Yu Gothic UI',sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(56,189,248,.24), transparent 34%),
        radial-gradient(circle at 88% 8%, rgba(34,197,94,.18), transparent 32%),
        linear-gradient(135deg, #eff6ff, #ecfeff 45%, #f8fafc);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(238,246,255,.82);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,.8);
    }
    .header-inner {
      max-width: 1180px;
      height: 56px;
      margin: 0 auto;
      padding: 0 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    a { color: var(--blue); text-decoration: none; font-weight: 800; }
    .brand { font-weight: 900; letter-spacing: 0; }
    main {
      max-width: 1320px;
      margin: 0 auto;
      padding: 28px 22px 56px;
    }
    .title-row {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }
    h1 { margin: 0 0 6px; font-size: clamp(1.7rem, 4vw, 2.8rem); line-height: 1.15; }
    .lead { margin: 0; color: var(--muted); font-size: .92rem; }
    .app {
      display: grid;
      grid-template-columns: minmax(260px, 330px) minmax(520px, 1fr);
      gap: 18px;
      align-items: stretch;
    }
    .panel {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.9);
      border-radius: 20px;
      box-shadow: 0 18px 46px var(--shadow), inset 0 1px 0 rgba(255,255,255,.95);
      padding: 18px;
      min-height: 500px;
    }
    .input-panel { min-height: auto; align-self: start; }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }
    h2 { margin: 0; font-size: 1rem; }
    .count {
      padding: 4px 10px;
      border-radius: 999px;
      background: #e0f2fe;
      color: var(--cyan);
      font-size: .72rem;
      font-weight: 900;
    }
    label { display: block; margin-bottom: 8px; color: var(--muted); font-size: .8rem; font-weight: 800; }
    textarea {
      width: 100%;
      min-height: 116px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      color: var(--text);
      background: rgba(255,255,255,.72);
      font: inherit;
      line-height: 1.7;
      outline: none;
    }
    textarea:focus { border-color: rgba(37,99,235,.55); box-shadow: 0 0 0 4px rgba(37,99,235,.1); }
    .tool-block { margin-top: 14px; }
    .task-editor {
      grid-column: 2 / -1;
      margin-top: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,.55);
    }
    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .field {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: rgba(255,255,255,.85);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      padding: 10px 11px;
      outline: none;
    }
    .field:disabled { opacity: .55; background: rgba(241,245,249,.7); }
    .color-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .swatch {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      padding: 0;
      border: 3px solid rgba(255,255,255,.92);
      box-shadow: 0 4px 12px rgba(15,23,42,.12);
    }
    .swatch.active { outline: 3px solid rgba(37,99,235,.38); }
    .import-drop {
      margin-top: 14px;
      padding: 16px;
      border: 2px dashed rgba(37,99,235,.28);
      border-radius: 16px;
      background: rgba(224,242,254,.42);
      color: var(--muted);
      font-size: .84rem;
      font-weight: 800;
      text-align: center;
    }
    .import-drop.dragging {
      border-color: var(--blue);
      background: rgba(37,99,235,.12);
      color: var(--blue);
    }
    .import-drop input { display: none; }
    .import-drop span { color: var(--blue); text-decoration: underline; cursor: pointer; }
    .add-task-button {
      width: 100%;
      margin-top: 12px;
      color: #fff;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      box-shadow: 0 10px 26px rgba(37,99,235,.18);
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, opacity .15s;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .45; cursor: default; transform: none; }
    .subtle { background: #e0f2fe; color: var(--cyan); }
    .danger { background: #ffe4e6; color: var(--rose); }
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 9px;
      max-height: 620px;
      overflow: auto;
      padding-right: 4px;
    }
    .group-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 8px 2px 2px;
      color: var(--muted);
      font-size: .76rem;
      font-weight: 900;
    }
    .group-title:first-child { margin-top: 0; }
    .task {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: rgba(255,255,255,.72);
      cursor: pointer;
      border-left: 6px solid var(--task-color, var(--blue));
    }
    .task.selected {
      border-color: rgba(37,99,235,.62);
      background: linear-gradient(135deg, rgba(37,99,235,.13), rgba(8,145,178,.12));
      box-shadow: inset 4px 0 0 var(--task-color, var(--blue));
    }
    .task input[type="checkbox"] { width: 18px; height: 18px; margin-top: 2px; accent-color: var(--green); }
    .task-text {
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
      font-weight: 700;
    }
    .task-meta {
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      justify-content: flex-end;
      white-space: nowrap;
    }
    .meta-pill {
      padding: 2px 7px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: .68rem;
      font-weight: 900;
    }
    .meta-high { background: #ffe4e6; color: #be123c; }
    .meta-medium { background: #fef3c7; color: #a16207; }
    .meta-low { background: #dcfce7; color: #15803d; }
    .task.done .task-text {
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-thickness: 2px;
    }
    .subtasks {
      grid-column: 2;
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 6px;
    }
    .subtask {
      display: grid;
      grid-template-columns: 22px 1fr;
      align-items: start;
      gap: 7px;
      color: var(--muted);
      font-size: .85rem;
      font-weight: 700;
    }
    .subtask input[type="checkbox"] { width: 15px; height: 15px; }
    .subtask.done span { text-decoration: line-through; }
    .item-editor {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 14px;
    }
    .item-editor input {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 12px;
      font: inherit;
      outline: none;
    }
    .list-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .empty {
      min-height: 220px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      border: 1px dashed rgba(100,116,139,.3);
      border-radius: 16px;
      background: rgba(255,255,255,.42);
      font-weight: 800;
    }
    .toast {
      min-height: 28px;
      margin-top: 10px;
      color: var(--rose);
      font-size: .82rem;
      font-weight: 900;
    }
    @media (max-width: 860px) {
      .title-row { align-items: start; flex-direction: column; }
      .app { grid-template-columns: 1fr; }
      .panel { min-height: auto; }
      .task-list { max-height: none; }
      .task { grid-template-columns: 28px minmax(0, 1fr); }
      .task-meta { grid-column: 2; justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <span class="brand">タスク管理アプリ</span>
      <a href="../">ホームへ戻る</a>
    </div>
  </header>
  <main>
    <div class="title-row">
      <div>
        <h1>タスク管理</h1>
        <p class="lead">左に入力してタスク追加。改行ごとに別タスクとして登録できます。</p>
      </div>
    </div>

    <div class="app">
      <section class="panel input-panel">
        <div class="panel-head">
          <h2>入力</h2>
        </div>
        <label for="taskInput">タスク内容</label>
        <textarea id="taskInput" placeholder="例: 見積書を確認する&#10;部品表を更新する"></textarea>
        <div class="import-drop" id="dropZone">
          <input id="fileInput" type="file" multiple accept=".txt,.md,.csv,.tsv,text/plain,text/markdown,text/csv">
          <span id="filePick">ファイルを選択</span>、またはここへドラッグ
        </div>
        <button class="add-task-button" id="taskButton" type="button">タスク追加</button>
        <div class="toast" id="toast" aria-live="polite"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>タスク一覧</h2>
          <span class="count" id="taskCount">0 Tasks</span>
        </div>
        <div id="taskList" class="task-list" aria-live="polite"></div>
        <div class="list-actions">
          <button class="danger" id="deleteButton" type="button" disabled>選択を削除</button>
          <button class="subtle" id="clearDoneButton" type="button">完了を削除</button>
        </div>
      </section>
    </div>
  </main>

  <script>
    (function () {
      var input = document.getElementById('taskInput');
      var taskButton = document.getElementById('taskButton');
      var dropZone = document.getElementById('dropZone');
      var fileInput = document.getElementById('fileInput');
      var filePick = document.getElementById('filePick');
      var list = document.getElementById('taskList');
      var count = document.getElementById('taskCount');
      var deleteButton = document.getElementById('deleteButton');
      var clearDoneButton = document.getElementById('clearDoneButton');
      var toast = document.getElementById('toast');
      var storageKey = 'toaruseigyoya-task-app';
      var colors = ['#2563eb', '#0891b2', '#16a34a', '#f59e0b', '#e11d48', '#7c3aed', '#475569'];
      var selectedId = null;
      var tasks = load();

      function load() {
        try {
          return JSON.parse(localStorage.getItem(storageKey) || '[]');
        } catch (e) {
          return [];
        }
      }

      function save() {
        localStorage.setItem(storageKey, JSON.stringify(tasks));
      }

      function show(message) {
        toast.textContent = message || '';
      }

      function addTask() {
        var lines = input.value.split(/\r?\n/).map(function (line) {
          return line.trim();
        }).filter(Boolean);
        if (!lines.length) {
          show('タスクを入力してください。');
          input.focus();
          return;
        }
        var added = lines.map(function (text) {
          return {
            id: makeId(),
            text: text,
            done: false,
            color: colors[0],
            group: '未分類',
            priority: '中',
            progress: '未着手',
            due: '',
            items: []
          };
        });
        tasks = added.concat(tasks);
        input.value = '';
        selectedId = added[0].id;
        show(lines.length + '件追加しました。');
        save();
        render();
      }

      function makeId() {
        return String(Date.now()) + Math.random().toString(16).slice(2);
      }

      function selectTask(id) {
        selectedId = selectedId === id ? null : id;
        render();
      }

      function toggleDone(id, checked) {
        tasks = tasks.map(function (task) {
          return task.id === id ? Object.assign({}, task, { done: checked }) : task;
        });
        save();
        render();
      }

      function toggleItem(taskId, itemId, checked) {
        tasks = tasks.map(function (task) {
          if (task.id !== taskId) return task;
          var items = (task.items || []).map(function (item) {
            return item.id === itemId ? Object.assign({}, item, { done: checked }) : item;
          });
          return Object.assign({}, task, { items: items });
        });
        save();
        render();
      }

      function addItem(taskId, field) {
        var text = field.value.trim();
        if (!taskId || !text) return;
        tasks = tasks.map(function (task) {
          if (task.id !== taskId) return task;
          var items = (task.items || []).concat([{ id: makeId(), text: text, done: false }]);
          return Object.assign({}, task, { items: items });
        });
        field.value = '';
        save();
        render();
      }

      function selectedTask() {
        return tasks.find(function (task) { return task.id === selectedId; }) || null;
      }

      function updateSelected(values) {
        if (!selectedId) return;
        tasks = tasks.map(function (task) {
          return task.id === selectedId ? Object.assign({}, task, values) : task;
        });
        save();
        render();
      }

      function setColor(color) {
        if (!selectedId) {
          show('色を変更するタスクを選択してください。');
          return;
        }
        updateSelected({ color: color });
      }

      function renderColors(container, task) {
        container.innerHTML = '';
        var selectedColor = task && task.color ? task.color : colors[0];
        colors.forEach(function (color) {
          var button = document.createElement('button');
          button.type = 'button';
          button.className = 'swatch' + (color === selectedColor ? ' active' : '');
          button.style.background = color;
          button.setAttribute('aria-label', '色を変更');
          button.addEventListener('click', function () { setColor(color); });
          container.appendChild(button);
        });
      }

      function makeSelect(options, value) {
        var select = document.createElement('select');
        select.className = 'field';
        options.forEach(function (option) {
          var opt = document.createElement('option');
          opt.value = option;
          opt.textContent = option;
          select.appendChild(opt);
        });
        select.value = value;
        return select;
      }

      function fieldBlock(labelText, field) {
        var wrap = document.createElement('div');
        var label = document.createElement('label');
        label.textContent = labelText;
        wrap.appendChild(label);
        wrap.appendChild(field);
        return wrap;
      }

      function renderTaskEditor(task) {
        var editor = document.createElement('div');
        editor.className = 'task-editor';
        editor.addEventListener('click', function (event) { event.stopPropagation(); });

        var colorBlock = document.createElement('div');
        colorBlock.className = 'tool-block';
        colorBlock.style.marginTop = '0';
        var colorLabel = document.createElement('label');
        colorLabel.textContent = '選択タスクの色';
        var colorRow = document.createElement('div');
        colorRow.className = 'color-row';
        colorBlock.appendChild(colorLabel);
        colorBlock.appendChild(colorRow);
        renderColors(colorRow, task);

        var grid = document.createElement('div');
        grid.className = 'editor-grid tool-block';

        var groupInput = document.createElement('input');
        groupInput.className = 'field';
        groupInput.type = 'text';
        groupInput.value = task.group || '未分類';
        groupInput.placeholder = '例: 仕事';
        groupInput.addEventListener('change', function () {
          updateSelected({ group: groupInput.value.trim() || '未分類' });
        });

        var dueInput = document.createElement('input');
        dueInput.className = 'field';
        dueInput.type = 'date';
        dueInput.value = task.due || '';
        dueInput.addEventListener('change', function () {
          updateSelected({ due: dueInput.value });
        });

        var prioritySelect = makeSelect(['高', '中', '低'], task.priority || '中');
        prioritySelect.addEventListener('change', function () {
          updateSelected({ priority: prioritySelect.value });
        });

        var progressSelect = makeSelect(['未着手', '進行中'], task.progress || '未着手');
        progressSelect.addEventListener('change', function () {
          updateSelected({ progress: progressSelect.value });
        });

        grid.appendChild(fieldBlock('グループ', groupInput));
        grid.appendChild(fieldBlock('期限', dueInput));
        grid.appendChild(fieldBlock('重要度', prioritySelect));
        grid.appendChild(fieldBlock('進捗', progressSelect));

        var subtasks = document.createElement('div');
        subtasks.className = 'subtasks';
        (task.items || []).forEach(function (sub) {
          var row = document.createElement('label');
          row.className = 'subtask' + (sub.done ? ' done' : '');

          var subCheck = document.createElement('input');
          subCheck.type = 'checkbox';
          subCheck.checked = sub.done;
          subCheck.addEventListener('click', function (event) {
            event.stopPropagation();
            toggleItem(task.id, sub.id, subCheck.checked);
          });

          var subText = document.createElement('span');
          subText.textContent = sub.text;
          row.appendChild(subCheck);
          row.appendChild(subText);
          subtasks.appendChild(row);
        });

        var itemEditor = document.createElement('div');
        itemEditor.className = 'item-editor';
        var itemInput = document.createElement('input');
        itemInput.type = 'text';
        itemInput.placeholder = '選択タスクにサブ項目を追加';
        var itemButton = document.createElement('button');
        itemButton.className = 'subtle';
        itemButton.type = 'button';
        itemButton.textContent = 'サブ項目追加';
        itemButton.addEventListener('click', function () { addItem(task.id, itemInput); });
        itemInput.addEventListener('keydown', function (event) {
          if (event.key === 'Enter') addItem(task.id, itemInput);
        });
        itemEditor.appendChild(itemInput);
        itemEditor.appendChild(itemButton);

        editor.appendChild(colorBlock);
        editor.appendChild(grid);
        if ((task.items || []).length) editor.appendChild(subtasks);
        editor.appendChild(itemEditor);
        return editor;
      }

      function deleteSelected() {
        if (!selectedId) return;
        tasks = tasks.filter(function (task) { return task.id !== selectedId; });
        selectedId = null;
        save();
        render();
      }

      function clearDone() {
        tasks = tasks.filter(function (task) { return !task.done; });
        if (!tasks.some(function (task) { return task.id === selectedId; })) selectedId = null;
        save();
        render();
      }

      function render() {
        list.innerHTML = '';
        count.textContent = tasks.length + (tasks.length === 1 ? ' Task' : ' Tasks');
        deleteButton.disabled = !selectedId;

        if (!tasks.length) {
          var empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = 'タスクはまだありません';
          list.appendChild(empty);
          return;
        }

        var grouped = tasks.reduce(function (acc, task) {
          var group = (task.group || '未分類').trim() || '未分類';
          if (!acc[group]) acc[group] = [];
          acc[group].push(task);
          return acc;
        }, {});

        Object.keys(grouped).sort(function (a, b) {
          if (a === '未分類') return 1;
          if (b === '未分類') return -1;
          return a.localeCompare(b, 'ja');
        }).forEach(function (group) {
          var heading = document.createElement('div');
          heading.className = 'group-title';
          var groupName = document.createElement('span');
          groupName.textContent = group;
          var groupCount = document.createElement('span');
          groupCount.textContent = grouped[group].length;
          heading.appendChild(groupName);
          heading.appendChild(groupCount);
          list.appendChild(heading);

          grouped[group].forEach(function (task) {
          var item = document.createElement('div');
          item.className = 'task' + (task.done ? ' done' : '') + (task.id === selectedId ? ' selected' : '');
          item.style.setProperty('--task-color', task.color || colors[0]);
          item.tabIndex = 0;
          item.setAttribute('role', 'button');
          item.setAttribute('aria-pressed', task.id === selectedId ? 'true' : 'false');

          var checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.checked = task.done;
          checkbox.setAttribute('aria-label', '完了にする');
          checkbox.addEventListener('click', function (event) {
            event.stopPropagation();
            toggleDone(task.id, checkbox.checked);
          });

          var text = document.createElement('div');
          text.className = 'task-text';
          text.textContent = task.text;

          var meta = document.createElement('div');
          meta.className = 'task-meta';
          var priority = task.priority || '中';
          var priorityClass = priority === '高' ? ' meta-high' : priority === '低' ? ' meta-low' : ' meta-medium';
          meta.innerHTML =
            '<span class="meta-pill' + priorityClass + '">' + priority + '</span>' +
            '<span class="meta-pill">' + (task.progress || '未着手') + '</span>';

          item.addEventListener('click', function () { selectTask(task.id); });
          item.addEventListener('keydown', function (event) {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              selectTask(task.id);
            }
          });

          item.appendChild(checkbox);
          item.appendChild(text);
          item.appendChild(meta);
          if (task.id === selectedId) item.appendChild(renderTaskEditor(task));
          list.appendChild(item);
        });
        });
      }

      function importFiles(files) {
        Array.prototype.slice.call(files || []).forEach(function (file) {
          var reader = new FileReader();
          reader.onload = function () {
            var text = String(reader.result || '').trim();
            if (!text) return;
            input.value = input.value ? input.value.replace(/\s*$/, '') + '\n' + text : text;
            show(file.name + ' を読み込みました。');
          };
          reader.readAsText(file);
        });
      }

      taskButton.addEventListener('click', addTask);
      filePick.addEventListener('click', function () { fileInput.click(); });
      fileInput.addEventListener('change', function () {
        importFiles(fileInput.files);
        fileInput.value = '';
      });
      dropZone.addEventListener('dragover', function (event) {
        event.preventDefault();
        dropZone.classList.add('dragging');
      });
      dropZone.addEventListener('dragleave', function () {
        dropZone.classList.remove('dragging');
      });
      dropZone.addEventListener('drop', function (event) {
        event.preventDefault();
        dropZone.classList.remove('dragging');
        importFiles(event.dataTransfer.files);
      });
      deleteButton.addEventListener('click', deleteSelected);
      clearDoneButton.addEventListener('click', clearDone);
      input.addEventListener('keydown', function (event) {
        if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') addTask();
      });

      render();
    })();
  </script>
</body>
</html>

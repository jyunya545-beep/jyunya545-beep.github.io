  <meta property="og:title" content="あいネコ日記 | とある制御屋の備忘録">

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CollectionPage",
      "name": "あいネコ日記",
      "url": "https://toaruseigyoya.github.io/articles/",
      "description": "今日もあいネコの日記一覧です。AI活用、子育て、便利ツール、サイト制作の試行錯誤を日付やカテゴリから探せます。",
      "isPartOf": {
        "@type": "WebSite",
        "name": "とある制御屋の備忘録",
        "url": "https://toaruseigyoya.github.io/"
      },
      "author": {
        "@type": "Person",
        "name": "今日もあいネコ"
      }
    }
  </script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--mint:#36c49f;--pink:#ff8cb3;--sky:#5fb5ff;--lemon:#ffd76a;--ink:#273044;--sub:#65708a;--line:#f0dccb;--shadow:0 14px 38px rgba(85,70,50,.10)}
    body{font-family:'Segoe UI','Yu Gothic UI','Hiragino Sans',sans-serif;background:linear-gradient(180deg,#fff8ee,#f7fbff 60%,#fff7fb);color:var(--ink);line-height:1.8;min-height:100vh}
    .site-banner{max-width:920px;margin:18px auto 0;padding:0 18px}
    .site-banner img{width:100%;max-height:300px;object-fit:contain;background:#fff;border-radius:18px;border:3px solid #fff;box-shadow:var(--shadow);display:block}
    main{max-width:980px;margin:0 auto;padding:24px 20px 70px}
    a{color:#0f7f68;text-decoration:none;font-weight:800}a:hover{text-decoration:underline}
    .crumb{display:inline-flex;min-height:40px;align-items:center;color:#0f7f68;font-size:.9rem;font-weight:900;text-decoration:none;margin-bottom:14px}
    .hero,.toolbar,.diary-list,.empty-note{background:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.95);border-radius:18px;box-shadow:var(--shadow);padding:22px;margin-bottom:16px}
    h1{font-size:clamp(1.8rem,5vw,2.8rem);line-height:1.2;letter-spacing:0;margin-bottom:10px}
    .lead{color:var(--sub);max-width:760px}
    .toolbar{display:grid;gap:12px}
    .search-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center}
    input[type="search"]{width:100%;min-height:42px;border:1.5px solid #dbe8f6;border-radius:12px;background:#fff;padding:9px 12px;font:inherit;color:var(--ink)}
    .count{color:var(--sub);font-size:.86rem;font-weight:900;white-space:nowrap}
    .tabs{display:flex;flex-wrap:wrap;gap:8px}
    .tab{border:1px solid #dcecf7;border-radius:999px;background:#f6fbff;color:#526179;font:inherit;font-size:.84rem;font-weight:900;padding:7px 12px;cursor:pointer}
    .tab.active{background:#0f7f68;border-color:#0f7f68;color:#fff}
    .diary-list{display:grid;gap:12px}
    .diary-card{display:grid;grid-template-columns:120px minmax(0,1fr);gap:14px;align-items:start;background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;color:var(--ink);text-decoration:none}
    .diary-card:hover{border-color:rgba(54,196,159,.45);box-shadow:0 10px 24px rgba(54,196,159,.12);text-decoration:none}
    .date{color:#0f7f68;font-weight:900;font-size:.9rem}
    .diary-main{display:grid;gap:7px}
    .diary-title{font-size:1.02rem;font-weight:900;line-height:1.45}
    .diary-summary{color:var(--sub);font-size:.92rem;line-height:1.7}
    .meta{display:flex;flex-wrap:wrap;gap:7px}
    .tag{display:inline-flex;align-items:center;min-height:26px;padding:3px 9px;border-radius:999px;background:#fff4cf;border:1px solid #ffe39b;color:#7b5d2a;font-size:.78rem;font-weight:900}
    .empty-note{display:none;color:var(--sub);font-weight:800}
    footer{text-align:center;color:#8a7890;font-size:.9rem;padding:24px}
    .footer-links{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin-bottom:10px}
    .footer-links a{display:inline-flex;align-items:center;min-height:42px;padding:8px 12px;border-radius:12px;background:#f6fbff;border:1px solid #dcecf7;color:#526179;text-decoration:none;font-weight:900}
    @media(max-width:700px){
      .site-banner,main{padding-inline:14px}
      .hero,.toolbar,.diary-list,.empty-note{padding:18px}
      .search-row{grid-template-columns:1fr}
      .diary-card{grid-template-columns:1fr;gap:8px}
    }
  </style>
  <script defer src="/assets/share-buttons.js"></script>
</head>
<body>
  <div class="site-banner"><img src="/assets/images/aineko-banner.png" alt="とある制御屋の備忘録"></div>
  <main>
    <a class="crumb" href="/">← ホームへ戻る</a>
    <section class="hero">
      <h1>あいネコ日記</h1>
      <p class="lead">AI活用、子育て、便利ツール、サイト制作の試行錯誤を日記として残していくページです。日付、カテゴリ、キーワードで探しやすい形にしています。</p>
    </section>

    <section class="toolbar" aria-label="日記を探す">
      <div class="search-row">
        <input id="diarySearch" type="search" placeholder="キーワードで検索">
        <div class="count" id="diaryCount">0件</div>
      </div>
      <div class="tabs" id="categoryTabs" aria-label="カテゴリ">
        <button class="tab active" type="button" data-category="all">すべて</button>
        <button class="tab" type="button" data-category="AI活用">AI活用</button>
        <button class="tab" type="button" data-category="子育て">子育て</button>
        <button class="tab" type="button" data-category="ツール">ツール</button>
        <button class="tab" type="button" data-category="サイト制作">サイト制作</button>
      </div>
    </section>

    <section class="diary-list" id="diaryList" aria-label="日記一覧">
      <a class="diary-card" href="#" data-category="サイト制作" data-search="ホームページ 整備 バナー 公開 ツール 日記">
        <time class="date" datetime="2026-05-16">2026/5/16</time>
        <div class="diary-main">
          <div class="diary-title">ホームページを日記が置ける形に整理中</div>
          <p class="diary-summary">サイト全体の表記や導線を見直しながら、日々の試行錯誤を残せる場所として「あいネコ日記」を整えています。</p>
          <div class="meta"><span class="tag">サイト制作</span><span class="tag">ホームページ</span></div>
        </div>
      </a>
    </section>
    <p class="empty-note" id="emptyNote">該当する日記はありません。</p>
  </main>
  <footer>
    <nav class="footer-links" aria-label="サイト情報">
      <a href="/contact/">お問い合わせ</a>
      <a href="/privacy/">プライバシーポリシー</a>
      <a href="/disclaimer/">免責事項</a>
    </nav>
    © 2026 とある制御屋の備忘録
  </footer>
  <script>
    (function(){
      var search = document.getElementById('diarySearch');
      var tabs = Array.from(document.querySelectorAll('.tab'));
      var cards = Array.from(document.querySelectorAll('.diary-card'));
      var count = document.getElementById('diaryCount');
      var empty = document.getElementById('emptyNote');
      var active = 'all';
      function render(){
        var q = (search.value || '').trim().toLowerCase();
        var shown = 0;
        cards.forEach(function(card){
          var category = card.getAttribute('data-category');
          var text = (card.textContent + ' ' + card.getAttribute('data-search')).toLowerCase();
          var visible = (active === 'all' || category === active) && (!q || text.indexOf(q) !== -1);
          card.style.display = visible ? '' : 'none';
          if (visible) shown++;
        });
        count.textContent = shown + '件 / ' + cards.length + '件';
        empty.style.display = shown ? 'none' : 'block';
      }
      tabs.forEach(function(tab){
        tab.addEventListener('click', function(){
          active = tab.getAttribute('data-category');
          tabs.forEach(function(item){ item.classList.toggle('active', item === tab); });
          render();
        });
      });
      search.addEventListener('input', render);
      render();
    })();
  </script>
</body>
</html>

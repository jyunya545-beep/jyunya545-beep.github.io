<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>フラワーマッチ3 | 無料ゲーム</title><style>body{margin:0;background:#fff7ed;color:#1f2937;font-family:"Yu Gothic UI","Meiryo",sans-serif}.app{width:min(900px,calc(100% - 20px));margin:auto;padding:22px 0}a{color:#2563eb;font-weight:800;text-decoration:none}.wrap{display:grid;grid-template-columns:minmax(0,1fr)220px;gap:14px}.board{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;background:#fde68a;border-radius:16px;padding:10px}.tile{aspect-ratio:1;border:0;border-radius:12px;background:#fff;font-size:1.8rem;cursor:pointer;box-shadow:0 5px 10px #0001}.sel{outline:4px solid #ef4444}.card{background:#fff;border:1px solid #fed7aa;border-radius:14px;padding:14px}.num{font-size:1.6rem;font-weight:1000;color:#db2777}button{font:inherit;font-weight:900}@media(max-width:720px){.wrap{grid-template-columns:1fr}.tile{font-size:1.3rem}}</style></head><body><main class="app"><a href="../">← 無料ゲーム一覧</a><h1>フラワーマッチ3</h1><p>隣り合う花を入れ替え、同じ種類を3つ以上そろえて消します。</p><div class="wrap"><div id="board" class="board"></div><aside class="card">スコア<div id="score" class="num">0</div><p id="msg">花を2つ選んで入れ替えます。</p><button id="reset">新規</button></aside></div></main><script>
const icons=['🌸','🌼','🌷','🌻','🍀','🌹'];let g=[],sel=null,score=0;function r(){return Math.floor(Math.random()*icons.length)}function start(){g=Array.from({length:8},()=>Array.from({length:8},r));score=0;clearAll();draw()}function draw(){board.innerHTML='';for(let y=0;y<8;y++)for(let x=0;x<8;x++){let b=document.createElement('button');b.className='tile'+(sel&&sel.x==x&&sel.y==y?' sel':'');b.textContent=icons[g[y][x]];b.onclick=()=>pick(x,y);board.appendChild(b)}scoreEl.textContent=score}function pick(x,y){if(!sel){sel={x,y};draw();return}if(Math.abs(sel.x-x)+Math.abs(sel.y-y)!==1){sel={x,y};draw();return}swap(sel.x,sel.y,x,y);if(!clearAll()){swap(sel.x,sel.y,x,y);msg.textContent='3つ以上そろう場所を選んでください。'}else msg.textContent='消えました。';sel=null;draw()}function swap(a,b,c,d){[g[b][a],g[d][c]]=[g[d][c],g[b][a]]}function clearAll(){let any=false;while(true){let m=new Set;for(let y=0;y<8;y++){let n=1;for(let x=1;x<=8;x++){if(x<8&&g[y][x]===g[y][x-1])n++;else{if(n>=3)for(let k=0;k<n;k++)m.add(y+','+(x-1-k));n=1}}}for(let x=0;x<8;x++){let n=1;for(let y=1;y<=8;y++){if(y<8&&g[y][x]===g[y-1][x])n++;else{if(n>=3)for(let k=0;k<n;k++)m.add((y-1-k)+','+x);n=1}}}if(!m.size)break;any=true;score+=m.size*10;m.forEach(s=>{let[y,x]=s.split(',').map(Number);g[y][x]=null});for(let x=0;x<8;x++){let col=[];for(let y=7;y>=0;y--)if(g[y][x]!=null)col.push(g[y][x]);while(col.length<8)col.push(r());for(let y=7;y>=0;y--)g[y][x]=col[7-y]}}return any}const board=document.getElementById('board'),scoreEl=document.getElementById('score');reset.onclick=start;start();
</script></body></html>

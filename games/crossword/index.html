<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>クロスワード | 無料ゲーム</title><style>body{margin:0;background:#f0fdf4;color:#172033;font-family:"Yu Gothic UI","Meiryo",sans-serif}main{width:min(820px,calc(100% - 20px));margin:auto;padding:22px 0}a{color:#2563eb;text-decoration:none;font-weight:800}.wrap{display:grid;grid-template-columns:360px 1fr;gap:16px}.grid{display:grid;grid-template-columns:repeat(7,1fr);background:#111827;gap:2px}.cell{aspect-ratio:1;background:#fff;border:0;text-align:center;font-size:1.4rem;font-weight:900;text-transform:uppercase}.blk{background:#111827}.card{background:#fff;border:1px solid #bbf7d0;border-radius:14px;padding:14px}button{border:0;border-radius:10px;background:#16a34a;color:#fff;padding:10px 14px;font:inherit;font-weight:900}@media(max-width:760px){.wrap{grid-template-columns:1fr}}</style>  <meta property="og:type" content="website">
  <meta property="og:site_name" content="とある制御屋の備忘録">
  <meta property="og:title" content="クロスワード | 無料ゲーム">

  <meta property="og:url" content="https://toaruseigyoya.github.io/games/crossword/">
  <meta property="og:image" content="https://toaruseigyoya.github.io/assets/images/aineko-banner.png">

</head><body><main><a href="../">← 無料ゲーム一覧</a><h1>クロスワード</h1><p>ヒントを見て英単語を入れるミニクロスワードです。</p><div class="wrap"><div id="grid" class="grid"></div><div class="card"><h2>ヒント</h2><p>横1: 人工知能</p><p>横2: 制御</p><p>横3: 道具</p><p>縦1: コードを書く人</p><p>縦2: 遊び</p><button id="check">チェック</button><p id="msg"></p></div></div></main><script>
const ans=['AI#####','CONTROL','TOOL###','D#E#G##','E#V#A##','R#GAME#','#######'];const grid=document.getElementById('grid'),cells=[];for(let r=0;r<7;r++)for(let c=0;c<7;c++){let ch=ans[r][c],i=document.createElement('input');if(ch==='#'){i.disabled=true;i.className='cell blk'}else{i.className='cell';i.maxLength=1}cells.push(i);grid.appendChild(i)}check.onclick=()=>{let ok=true;for(let i=0;i<49;i++){let ch=ans[Math.floor(i/7)][i%7];if(ch!=='#'&&(cells[i].value||'').toUpperCase()!==ch)ok=false}msg.textContent=ok?'正解です。':'まだ違うマスがあります。'}
</script></body></html>

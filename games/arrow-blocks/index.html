<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アローブロック | 無料ゲーム</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}body{margin:0;min-height:100vh;background:#f7fbff;color:#172033;font-family:"Yu Gothic UI","Meiryo",system-ui,sans-serif}.app{width:min(980px,calc(100% - 20px));margin:auto;padding:22px 0 34px}a{color:#2563eb;text-decoration:none;font-weight:800}.head{display:flex;justify-content:space-between;gap:14px;align-items:end;margin-bottom:14px}h1{margin:8px 0 4px;font-size:clamp(1.6rem,4vw,2.4rem)}p{color:#526179;line-height:1.6}.panel{display:grid;grid-template-columns:minmax(0,1fr)260px;gap:14px}.board{display:grid;grid-template-columns:repeat(6,1fr);aspect-ratio:1;background:#dbeafe;border:3px solid #1d4ed8;border-radius:16px;padding:8px;gap:6px}.cell{border-radius:10px;background:rgba(255,255,255,.62);display:grid;place-items:center}.block{width:100%;height:100%;border:0;border-radius:10px;color:#fff;font-size:1.6rem;font-weight:1000;cursor:pointer;box-shadow:0 7px 14px rgba(37,99,235,.18)}.b0{background:#2563eb}.b1{background:#ec4899}.b2{background:#f97316}.b3{background:#10b981}.b4{background:#7c3aed}.side{display:grid;gap:12px}.card{background:#fff;border:1px solid #dbeafe;border-radius:14px;padding:14px;box-shadow:0 10px 24px rgba(37,99,235,.08)}button{border:0;border-radius:10px;padding:10px 12px;font:inherit;font-weight:900;cursor:pointer;background:#2563eb;color:#fff}.muted{background:#eaf1ff;color:#1e3a8a}.stat{font-size:1.5rem;font-weight:1000;color:#dc2626}.msg{font-weight:900;color:#334155}@media(max-width:760px){.panel{grid-template-columns:1fr}.board{gap:4px;padding:5px}.block{font-size:1.25rem}}
  </style>
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="今日もあいネコ">
  <meta property="og:title" content="アローブロック | 無料ゲーム">
  <meta property="og:description" content="今日もあいネコのページです。">
  <meta property="og:url" content="https://toaruseigyoya.github.io/games/arrow-blocks/">
  <meta property="og:image" content="https://toaruseigyoya.github.io/assets/images/aineko-banner.png">
  
  
  <script defer src="/assets/share-buttons.js"></script>
</head>
<body>
<main class="app">
  <a href="../">← 無料ゲーム一覧</a>
  <div class="head"><div><h1>アローブロック</h1><p>ブロックを矢印方向へ動かし、盤面の外へすべて逃がすパズルです。</p></div></div>
  <div class="panel">
    <section><div id="board" class="board" aria-label="アローブロック盤面"></div></section>
    <aside class="side">
      <div class="card"><div>残り</div><div id="remain" class="stat">0</div></div>
      <div class="card"><div>手数</div><div id="moves" class="stat">0</div></div>
      <div class="card"><p id="msg" class="msg">矢印ブロックを押してください。</p><button id="reset">新規パズル</button> <button id="hint" class="muted">ヒント</button></div>
    </aside>
  </div>
</main>
<script>
const N=6, dirs={U:[-1,0,'↑'],D:[1,0,'↓'],L:[0,-1,'←'],R:[0,1,'→']};let blocks=[],moves=0,seed=1;
function rnd(){seed=(seed*1103515245+12345)&0x7fffffff;return seed}
function start(){moves=0;blocks=[];let id=0;const presets=[['R',0,0],['D',0,2],['L',1,5],['U',5,1],['R',2,1],['D',1,3],['L',4,5],['U',5,4],['R',3,0],['L',2,4],['D',0,5],['U',4,2]];presets.forEach(p=>blocks.push({id:id++,d:p[0],r:p[1],c:p[2]}));render('矢印方向に通路が空いているブロックを外へ出します。')}
function render(message){const b=document.getElementById('board');b.innerHTML='';for(let r=0;r<N;r++)for(let c=0;c<N;c++){const cell=document.createElement('div');cell.className='cell';const x=blocks.find(v=>v.r===r&&v.c===c);if(x){const btn=document.createElement('button');btn.className='block b'+(x.id%5);btn.textContent=dirs[x.d][2];btn.onclick=()=>move(x.id);cell.appendChild(btn)}b.appendChild(cell)}remain.textContent=blocks.length;movesEl.textContent=moves;msg.textContent=message||'';if(!blocks.length)msg.textContent='CLEAR! すべてのブロックを外へ出しました。'}
function blocked(r,c,id){return blocks.some(b=>b.id!==id&&b.r===r&&b.c===c)}
function move(id){const x=blocks.find(b=>b.id===id);if(!x)return;const [dr,dc]=dirs[x.d];let r=x.r,c=x.c,path=[];while(true){r+=dr;c+=dc;if(r<0||c<0||r>=N||c>=N){blocks=blocks.filter(b=>b.id!==id);moves++;render('外へ出ました。');return}if(blocked(r,c,id)){render('その方向は他のブロックに当たっています。');return}path.push([r,c])}}
function hintMove(){const ok=blocks.find(b=>{const[dr,dc]=dirs[b.d];let r=b.r,c=b.c;while(true){r+=dr;c+=dc;if(r<0||c<0||r>=N||c>=N)return true;if(blocked(r,c,b.id))return false}});render(ok?'動かせる候補: '+dirs[ok.d][2]+' のブロック':'今は動かせるブロックがありません。')}
const movesEl=document.getElementById('moves');reset.onclick=start;hint.onclick=hintMove;start();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>汎用ツール一覧｜今日もあいネコ</title>
  <meta name="description" content="PDF結合・分割、文字抽出、メール文面作成、SNS画像作成、名前メーカー、URL短縮など、汎用ツールを一覧から選べます。">
  <link rel="canonical" href="https://toaruseigyoya.github.io/utilities/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="今日もあいネコ">
  <meta property="og:title" content="汎用ツール一覧｜無料Webツール">
  <meta property="og:description" content="PDF処理、文字抽出、メール文面作成、画像作成、名前生成など、汎用ツールを一覧から選べます。">
  <meta property="og:url" content="https://toaruseigyoya.github.io/utilities/">
  <meta name="twitter:card" content="summary">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #f4f8fb;
      --panel: #ffffff;
      --line: #dbe7f0;
      --text: #172033;
      --muted: #64748b;
      --blue: #2563eb;
      --cyan: #0891b2;
      --green: #16a34a;
      --shadow: rgba(15, 23, 42, .08);
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI','Hiragino Sans','Yu Gothic UI',sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, #f8fbff, #eef8fb 46%, #f8fafc);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(248,251,255,.9);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }
    .header-inner {
      max-width: 1080px;
      height: 56px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    a { color: inherit; text-decoration: none; }
    .brand { font-weight: 900; }
    .home-link { color: var(--blue); font-weight: 850; font-size: .86rem; }
    main { max-width: 1080px; margin: 0 auto; padding: 28px 20px 58px; }
    .hero {
      margin-bottom: 18px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }
    h1 { margin: 0 0 8px; font-size: clamp(1.7rem, 4vw, 2.5rem); line-height: 1.2; }
    .hero p { max-width: 820px; margin: 0; color: var(--muted); line-height: 1.8; font-weight: 750; }
    .tool-list {
      display: grid;
      gap: 10px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: 0 8px 24px var(--shadow);
      max-width: 760px;
    }
    .tool-list a {
      display: block;
      padding: 9px 0;
      border-top: 1px solid #eef2f7;
      color: var(--text);
      font-size: 1rem;
      font-weight: 900;
      line-height: 1.5;
    }
    .tool-list a:first-child { border-top: 0; }
    .tool-list a:hover { color: var(--blue); text-decoration: underline; }
    @media (max-width: 760px) {
      main { padding: 22px 14px 44px; }
      .header-inner { padding: 0 14px; }
    }
  </style>
  <script defer src="/assets/share-buttons.js"></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <span class="brand">汎用ツール一覧</span>
      <a class="home-link" href="../">ホームへ戻る</a>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>汎用ツール一覧</h1>
      <p>汎用ツール集</p>
    </section>

    <nav class="tool-list" aria-label="汎用ツール">
      <a href="./pdf/">PDF結合・分割ツール</a>
      <a href="./text-extract/">文字抽出ツール</a>
      <a href="./mail-generator/">メール文面自動作成</a>
      <a href="./image-maker/">SNS画像自動作成</a>
      <a href="./name-maker/">名前メーカー</a>
      <a href="./url-shortener/">URL短縮</a>
    </nav>
  </main>
</body>
</html>

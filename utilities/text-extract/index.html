<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF・画像文字抽出ツール｜便利ツール集</title>
  <meta name="description" content="PDF、PNG、JPEGから文字を抽出できる無料ツールです。PDF内テキスト抽出と日本語・英語OCRに対応しています。">
  <link rel="canonical" href="https://toaruseigyoya.github.io/utilities/text-extract/">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; }
    :root { --bg:#f0fdfa; --panel:#fff; --line:#cbd5e1; --text:#134e4a; --muted:#64748b; --teal:#0f766e; --blue:#2563eb; --green:#15803d; --rose:#e11d48; --amber:#b45309; }
    body { margin:0; font-family:"Yu Gothic UI","Meiryo",system-ui,sans-serif; color:var(--text); background:linear-gradient(180deg,#ecfeff,#f8fafc); }
    header, main { width:min(1180px, calc(100% - 24px)); margin:auto; }
    header { padding:18px 0 10px; }
    a { color:var(--teal); font-weight:800; text-decoration:none; }
    h1 { margin:14px 0 8px; font-size:clamp(1.6rem, 4vw, 2.35rem); }
    h2 { margin:0 0 10px; font-size:1.05rem; }
    p { line-height:1.7; }
    .lead, .small, .hint { color:var(--muted); }
    .layout { display:grid; grid-template-columns:minmax(320px,410px) minmax(0,1fr); gap:16px; align-items:start; margin:18px 0 30px; }
    .panel { background:rgba(255,255,255,.94); border:1px solid var(--line); border-radius:12px; padding:16px; box-shadow:0 12px 30px rgba(15,118,110,.08); }
    .drop { border:2px dashed #5eead4; border-radius:12px; padding:24px 14px; text-align:center; background:#f0fdfa; cursor:pointer; }
    .drop.dragging { border-color:var(--blue); background:#eff6ff; }
    .row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    button { border:0; border-radius:9px; padding:9px 13px; font:inherit; font-size:.84rem; font-weight:900; cursor:pointer; background:#ccfbf1; color:var(--text); }
    button.primary { color:#fff; background:linear-gradient(135deg,var(--teal),var(--blue)); }
    button.danger { color:#be123c; background:#ffe4e6; }
    button:disabled { opacity:.48; cursor:not-allowed; }
    textarea { width:100%; min-height:360px; border:1px solid var(--line); border-radius:10px; padding:12px; resize:vertical; font:14px/1.6 Consolas,"Yu Gothic UI",monospace; color:#0f172a; background:#fff; }
    .hidden { display:none; }
    .status { margin-top:12px; padding:10px 12px; border-radius:10px; background:#ecfeff; color:#0f766e; font-weight:800; }
    .status.ok { background:#ecfdf5; color:var(--green); }
    .status.error { background:#fff1f2; color:#be123c; }
    .status.warn { background:#fffbeb; color:var(--amber); }
    .file-list, .result-list { display:grid; gap:9px; margin-top:12px; }
    .file-row, .result-card { border:1px solid var(--line); border-radius:10px; background:#f8fafc; padding:10px; }
    .file-name { font-weight:900; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .file-meta { color:var(--muted); font-size:.8rem; margin-top:2px; }
    .result-head { display:flex; justify-content:space-between; gap:8px; align-items:center; margin-bottom:8px; }
    .result-text { white-space:pre-wrap; color:#0f172a; background:#fff; border:1px solid #e2e8f0; border-radius:8px; padding:9px; max-height:220px; overflow:auto; }
    @media (max-width:760px) {
      header, main { width:min(100% - 16px, 1180px); }
      .layout { grid-template-columns:1fr; }
      textarea { min-height:260px; }
      button { min-height:38px; }
    }
  </style>
</head>
<body>
  <header>
    <a href="../">← 便利ツール集</a>
    <h1>PDF・画像文字抽出ツール</h1>
    <p class="lead">PDFの埋め込みテキスト、PNG/JPEG画像内の日本語・英語文字を抽出します。処理はブラウザ内で行います。</p>
  </header>
  <main>
    <div class="layout">
      <section class="panel">
        <h2>ファイル追加</h2>
        <div class="drop" id="dropZone">
          <strong>PDF・PNG・JPEGをドラッグ＆ドロップ</strong>
          <div class="small">複数ファイルに対応</div>
        </div>
        <input class="hidden" id="fileInput" type="file" accept="application/pdf,.pdf,image/png,image/jpeg,.png,.jpg,.jpeg" multiple>
        <div class="row" style="margin-top:10px">
          <button type="button" id="pickFiles">ファイルを選択</button>
          <button type="button" class="primary" id="extractButton" disabled>文字抽出</button>
          <button type="button" class="danger" id="clearFiles">全削除</button>
        </div>
        <div class="status" id="status">文字抽出したいファイルを追加してください。</div>
        <div class="file-list" id="fileList"></div>
      </section>

      <section class="panel">
        <h2>抽出結果</h2>
        <textarea id="allOutput" readonly placeholder="抽出した文字がここに表示されます。"></textarea>
        <div class="row" style="margin-top:10px">
          <button type="button" id="copyAll" disabled>全結果コピー</button>
          <button type="button" id="saveAll" disabled>全結果txt保存</button>
          <button type="button" id="clearResults">結果クリア</button>
        </div>
        <p class="hint">画像OCRは画質、傾き、手書き文字の状態によって精度が変わります。</p>
        <div class="result-list" id="resultList"></div>
      </section>
    </div>
  </main>

  <script>
    (function () {
      'use strict';
      var files = [];
      var results = [];
      var $ = function (id) { return document.getElementById(id); };
      var dropZone = $('dropZone'), fileInput = $('fileInput'), fileList = $('fileList'), status = $('status'), allOutput = $('allOutput'), resultList = $('resultList');

      if (window.pdfjsLib) {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
      function setStatus(message, kind) {
        status.textContent = message;
        status.className = 'status' + (kind ? ' ' + kind : '');
      }
      function setBusy(busy) {
        $('extractButton').disabled = busy || !files.length;
        $('pickFiles').disabled = busy;
        $('clearFiles').disabled = busy;
      }
      function bytes(size) {
        if (size > 1024 * 1024) return (size / 1024 / 1024).toFixed(1) + 'MB';
        return Math.max(1, Math.round(size / 1024)) + 'KB';
      }
      function readArrayBuffer(file) {
        return new Promise(function (resolve, reject) {
          var reader = new FileReader();
          reader.onerror = function () { reject(new Error('ファイルを読み込めませんでした。')); };
          reader.onload = function () { resolve(reader.result); };
          reader.readAsArrayBuffer(file);
        });
      }
      function addFiles(list) {
        var incoming = Array.prototype.slice.call(list || []).filter(function (file) {
          return file.type === 'application/pdf' || /^image\/(png|jpeg)$/.test(file.type) || /\.(pdf|png|jpe?g)$/i.test(file.name);
        });
        if (!incoming.length) {
          setStatus('PDF、PNG、JPEGだけ追加できます。', 'error');
          return;
        }
        incoming.forEach(function (file) { files.push({ id: Date.now() + '-' + Math.random(), file: file }); });
        renderFiles();
        setStatus(files.length + '件のファイルを追加しました。', 'ok');
      }
      function renderFiles() {
        fileList.innerHTML = '';
        files.forEach(function (item) {
          var row = document.createElement('div');
          row.className = 'file-row';
          row.innerHTML = '<div class="file-name"></div><div class="file-meta"></div>';
          row.querySelector('.file-name').textContent = item.file.name;
          row.querySelector('.file-meta').textContent = item.file.type + ' / ' + bytes(item.file.size);
          fileList.appendChild(row);
        });
        $('extractButton').disabled = !files.length;
      }
      async function extractPdf(file) {
        if (!window.pdfjsLib) throw new Error('PDF文字抽出ライブラリを読み込めませんでした。');
        var pdf = await pdfjsLib.getDocument({ data: await readArrayBuffer(file) }).promise;
        var chunks = [];
        for (var pageNo = 1; pageNo <= pdf.numPages; pageNo++) {
          setStatus('処理中... ' + file.name + ' ' + pageNo + '/' + pdf.numPages + 'ページ');
          var page = await pdf.getPage(pageNo);
          var content = await page.getTextContent();
          var text = content.items.map(function (item) { return item.str; }).join(' ').replace(/\s+/g, ' ').trim();
          chunks.push('--- page ' + pageNo + ' ---\n' + (text || '[このページから埋め込みテキストを抽出できませんでした]'));
        }
        return chunks.join('\n\n');
      }
      async function extractImage(file) {
        if (!window.Tesseract) throw new Error('画像OCRライブラリを読み込めませんでした。');
        var result = await Tesseract.recognize(file, 'jpn+eng', {
          logger: function (message) {
            if (message.status) {
              var pct = message.progress ? ' ' + Math.round(message.progress * 100) + '%' : '';
              setStatus('処理中... OCR ' + file.name + ' / ' + message.status + pct);
            }
          }
        });
        return (result.data.text || '').trim() || '[文字を検出できませんでした]';
      }
      async function extractAll() {
        if (!files.length) return setStatus('文字抽出したいファイルを追加してください。', 'error');
        setBusy(true);
        results = [];
        allOutput.value = '';
        resultList.innerHTML = '';
        try {
          for (var i = 0; i < files.length; i++) {
            var file = files[i].file;
            var text = /\.pdf$/i.test(file.name) || file.type === 'application/pdf' ? await extractPdf(file) : await extractImage(file);
            results.push({ name: file.name, text: text });
            renderResults();
          }
          setStatus('文字抽出が完了しました。', 'ok');
        } catch (error) {
          setStatus('文字抽出に失敗しました: ' + error.message, 'error');
        } finally {
          setBusy(false);
          renderResults();
        }
      }
      function renderResults() {
        var joined = results.map(function (r) { return '===== ' + r.name + ' =====\n' + r.text; }).join('\n\n');
        allOutput.value = joined;
        $('copyAll').disabled = !joined;
        $('saveAll').disabled = !joined;
        resultList.innerHTML = '';
        results.forEach(function (r, index) {
          var card = document.createElement('div');
          card.className = 'result-card';
          card.innerHTML = '<div class="result-head"><strong></strong><div class="row"><button type="button" data-copy="' + index + '">コピー</button><button type="button" data-save="' + index + '">txt保存</button></div></div><div class="result-text"></div>';
          card.querySelector('strong').textContent = r.name;
          card.querySelector('.result-text').textContent = r.text;
          resultList.appendChild(card);
        });
      }
      function downloadText(name, text) {
        var blob = new Blob([text], { type:'text/plain;charset=utf-8' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name.replace(/\.[^.]+$/, '') + '.txt';
        a.click();
        setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);
      }
      function copy(text) {
        if (!text) return setStatus('コピーする結果がありません。', 'error');
        navigator.clipboard.writeText(text).then(function () { setStatus('コピーしました。', 'ok'); }, function () { setStatus('コピーできませんでした。手動で選択してください。', 'error'); });
      }
      dropZone.addEventListener('click', function () { fileInput.click(); });
      dropZone.addEventListener('dragover', function (e) { e.preventDefault(); dropZone.classList.add('dragging'); });
      dropZone.addEventListener('dragleave', function () { dropZone.classList.remove('dragging'); });
      dropZone.addEventListener('drop', function (e) { e.preventDefault(); dropZone.classList.remove('dragging'); addFiles(e.dataTransfer.files); });
      $('pickFiles').addEventListener('click', function () { fileInput.click(); });
      fileInput.addEventListener('change', function () { addFiles(fileInput.files); fileInput.value = ''; });
      $('extractButton').addEventListener('click', extractAll);
      $('clearFiles').addEventListener('click', function () { files = []; renderFiles(); setStatus('文字抽出したいファイルを追加してください。'); });
      $('clearResults').addEventListener('click', function () { results = []; renderResults(); setStatus('結果をクリアしました。'); });
      $('copyAll').addEventListener('click', function () { copy(allOutput.value); });
      $('saveAll').addEventListener('click', function () { downloadText('extracted-text.txt', allOutput.value); });
      document.addEventListener('click', function (e) {
        var copyBtn = e.target.closest('[data-copy]');
        var saveBtn = e.target.closest('[data-save]');
        if (copyBtn) copy(results[Number(copyBtn.getAttribute('data-copy'))]?.text || '');
        if (saveBtn) {
          var item = results[Number(saveBtn.getAttribute('data-save'))];
          if (item) downloadText(item.name, item.text);
        }
      });
      if (!window.pdfjsLib || !window.Tesseract) setStatus('外部ライブラリの読み込みに失敗している可能性があります。ネットワークを確認してください。', 'warn');
      renderFiles();
      renderResults();
    })();
  </script>
</body>
</html>
